# Testing: banco isolado em porta configurável, dados efêmeros
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#        docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

name: ats-web-test

services:
  db:
    ports:
      - "${POSTGRES_TEST_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ats_web_test
    tmpfs:
      - /var/lib/postgresql/data:noexec
