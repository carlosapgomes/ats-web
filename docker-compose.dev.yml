# Development: banco com porta exposta e volume persistente
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

name: ats-web-dev

services:
  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ats_web_dev
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
