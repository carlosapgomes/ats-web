services:
  db:
    image: postgres:17
    container_name: ats-web-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ats_web_dev
      POSTGRES_USER: ats_web
      POSTGRES_PASSWORD: ats_web_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
