# Base: definição comum do serviço PostgreSQL
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ats_web
      POSTGRES_PASSWORD: ats_web_dev
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_web"]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - ats-net

networks:
  ats-net:
    driver: bridge
