# Production: gunicorn + worker, no exposed DB port
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: ats-web-prod

services:
  db:
    environment:
      POSTGRES_DB: ats_web
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    # no ports — accessible only via internal compose network
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://ats_web:${POSTGRES_PASSWORD}@db:5432/ats_web
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      INTRANET_IP_RANGE: ${INTRANET_IP_RANGE:-10.0.0.0/8}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ats-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python manage.py qcluster --settings=config.settings.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://ats_web:${POSTGRES_PASSWORD}@db:5432/ats_web
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY}
      INTRANET_IP_RANGE: ${INTRANET_IP_RANGE:-10.0.0.0/8}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ats-net
    restart: unless-stopped

volumes:
  pgdata_prod:
