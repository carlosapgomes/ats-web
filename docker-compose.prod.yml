# Production: gunicorn + worker, PostgreSQL bound to localhost by default
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: ats-web-prod

services:
  db:
    environment:
      POSTGRES_DB: ats_web
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_HOST_PORT:-8000}:8000"
    volumes:
      - media_prod:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://ats_web:${POSTGRES_PASSWORD}@db:5432/ats_web
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      INTRANET_IP_RANGE: ${INTRANET_IP_RANGE:-10.0.0.0/8}
      APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-ATS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ats-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python manage.py qcluster --settings=config.settings.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://ats_web:${POSTGRES_PASSWORD}@db:5432/ats_web
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY}
      INTRANET_IP_RANGE: ${INTRANET_IP_RANGE:-10.0.0.0/8}
      APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-ATS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      Q_CLUSTER_NAME: llm
    volumes:
      - media_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ats-net
    restart: unless-stopped

  pdf_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python manage.py qcluster --settings=config.settings.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://ats_web:${POSTGRES_PASSWORD}@db:5432/ats_web
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY}
      INTRANET_IP_RANGE: ${INTRANET_IP_RANGE:-10.0.0.0/8}
      APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-ATS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      Q_CLUSTER_NAME: pdf
    volumes:
      - media_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ats-net
    restart: unless-stopped

volumes:
  pgdata_prod:
  media_prod:
