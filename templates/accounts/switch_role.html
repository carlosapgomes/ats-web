<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ATS Web — Selecionar Papel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-3">Bem-vindo(a), {{ user.username }}</h3>
                    <p class="text-muted text-center mb-4">Escolha com qual papel deseja entrar:</p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-warning">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <div class="d-grid gap-2">
                        {% for role in roles %}
                            <form method="post">
                                {% csrf_token %}
                                <input type="hidden" name="role" value="{{ role.name }}">
                                <button type="submit" class="btn btn-outline-primary w-100 py-3">
                                    {{ role.label }}
                                </button>
                            </form>
                        {% endfor %}
                    </div>

                    <div class="text-center mt-3">
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link text-muted">Sair</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
