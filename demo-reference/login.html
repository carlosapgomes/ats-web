<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Sistema de Triagem Hospitalar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <style>
    .login-container {
      max-width: 440px;
      margin: 3rem auto;
    }
    .role-demo-selector {
      background: rgba(47, 143, 157, 0.06);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body class="hospital-shell">

<header class="app-header text-white py-3 mb-4">
  <div class="container">
    <h1 class="app-header__title">Sistema de Triagem Hospitalar</h1>
    <p class="app-header__subtitle">Acesso operacional</p>
  </div>
</header>

<main class="app-shell container pb-5">
  <div class="login-container">
    <div class="card p-4">
      <h3 class="mb-3">Entrar</h3>
      <form>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="usuario@hospital.org" value="maria.silva@hospital.org" autocomplete="email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" value="••••••••" autocomplete="current-password">
        </div>
        <button type="button" class="btn btn-hospital w-100 mb-3" id="btn-login">Entrar</button>
        <p class="text-muted small text-center mb-0" id="login-hint">
          Use o seletor abaixo para simular o acesso de cada papel.
        </p>
      </form>

      <!-- Demo: role selector -->
      <div class="role-demo-selector">
        <label class="form-label small mb-2">🔬 Demo — Selecionar papel para simulação:</label>
        <select class="form-select form-select-sm" id="role-select">
          <option value="nir">NIR — Recepção</option>
          <option value="doctor">Médico</option>
          <option value="scheduler">Agendador</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const REDIRECTS = {
    nir:       '../nir/dashboard.html',
    doctor:    '../doctor/queue.html',
    scheduler: '../scheduler/queue.html',
    admin:     '../admin/dashboard.html'
  };

  document.getElementById('btn-login').addEventListener('click', function () {
    var role = document.getElementById('role-select').value;
    window.location.href = REDIRECTS[role];
  });
</script>
</body>
</html>
